<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="800" viewBox="0 0 1920 800">
  <!-- fundo -->
  <rect width="1920" height="800" fill="#005FA9"></rect>

  <!-- área amarela diagonal -->
  <path d="M980 800 L1920 800 L1920 0 L1560 0 L980 520 Z" fill="#F3D147"></path>

  <!-- detalhe "degrau" (parecido com a imagem) -->
  <path d="M980 520 L980 640 L1110 640 L1110 740 L980 740 L980 800 L860 800 L860 680 L940 680 L940 560 Z" fill="#005FA9" opacity="0.95"></path>

  <!-- retângulo branco arredondado (topo direito) -->
  <rect x="1500" y="40" width="520" height="140" rx="40" fill="#FFFFFF"></rect>

  <!-- pequenas barras/retângulos -->
  <rect x="1760" y="180" width="120" height="44" fill="#005FA9" opacity="0.95"></rect>
  <rect x="150" y="120" width="60" height="44" fill="#FFFFFF" opacity="0.95"></rect>

  <!-- quadradinhos amarelos -->
  <rect x="1180" y="120" width="54" height="40" fill="#F3D147" opacity="0.95"></rect>
  <rect x="520" y="650" width="54" height="40" fill="#F3D147" opacity="0.95"></rect>

  <!-- triângulo (play) -->
  <path d="M1185 330 L1235 360 L1185 390 Z" fill="#FFFFFF" opacity="0.95"></path>

  <!-- meia-lua / semi-círculo azul mais escuro -->
  <path d="M1120 520 A140 140 0 0 0 1400 520 L1120 520 Z" fill="#0A4F8A" opacity="0.95"></path>

  <!-- linha diagonal branca -->
  <rect x="1150" y="520" width="520" height="14" fill="#FFFFFF" opacity="0.9" transform="rotate(32 1150 520)"></rect>

  <!-- pontilhado canto inferior esquerdo -->
  <g fill="#FFFFFF" opacity="0.85">
    <circle cx="110" cy="690" r="8"></circle><circle cx="150" cy="690" r="8"></circle><circle cx="190" cy="690" r="8"></circle>
    <circle cx="110" cy="730" r="8"></circle><circle cx="150" cy="730" r="8"></circle><circle cx="190" cy="730" r="8"></circle>
    <circle cx="110" cy="770" r="8"></circle><circle cx="150" cy="770" r="8"></circle><circle cx="190" cy="770" r="8"></circle>
    <circle cx="230" cy="730" r="8"></circle><circle cx="270" cy="730" r="8"></circle>
  </g>

  <!-- pontilhado canto inferior direito -->
  <g fill="#111827" opacity="0.55">
    <circle cx="1600" cy="640" r="7"></circle><circle cx="1640" cy="640" r="7"></circle><circle cx="1680" cy="640" r="7"></circle>
    <circle cx="1600" cy="680" r="7"></circle><circle cx="1640" cy="680" r="7"></circle><circle cx="1680" cy="680" r="7"></circle>
    <circle cx="1600" cy="720" r="7"></circle><circle cx="1640" cy="720" r="7"></circle><circle cx="1680" cy="720" r="7"></circle>
    <circle cx="1600" cy="760" r="7"></circle><circle cx="1640" cy="760" r="7"></circle><circle cx="1680" cy="760" r="7"></circle>
  </g>

  <!-- “estrelinha” canto inferior direito -->
  <path d="M1800 740
           C1815 720, 1830 720, 1845 740
           C1865 725, 1885 740, 1865 760
           C1885 780, 1865 795, 1845 780
           C1830 800, 1815 800, 1800 780
           C1780 795, 1760 780, 1780 760
           C1760 740, 1780 725, 1800 740 Z" fill="#F3D147" opacity="0.35"></path>

  <!-- sombra suave na base -->
  <ellipse cx="960" cy="805" rx="1000" ry="35" fill="#000000" opacity="0.15"></ellipse>
</svg>
